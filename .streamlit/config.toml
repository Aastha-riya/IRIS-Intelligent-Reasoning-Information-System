[theme]
base            = "dark"
primaryColor    = "#1f6feb"
backgroundColor = "#0e1117"
secondaryBackgroundColor = "#161b22"
textColor       = "#e0e0e0"
font            = "sans serif"

[server]
headless        = true
enableCORS      = false
enableXsrfProtection = true
maxUploadSize   = 10

[browser]
gatherUsageStats = false
